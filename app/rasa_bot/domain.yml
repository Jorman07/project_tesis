responses:
  utter_saludo:
    - text: "Hola 👋 ¿Qué deseas consultar? Puedo ayudarte con reportes, conteos y datos de pacientes."

  utter_despedida:
    - text: "Listo ✅ Si necesitas otro reporte o consulta, aquí estoy."

  utter_bot_info:
    - text: |
        Soy un asistente para consultas de inmunización.
        Puedo:
        • Generar reportes por periodo
        • Contar dosis por vacuna y fecha
        • Consultar historial y datos puntuales de un paciente (con cédula)

  utter_out_of_scope:
    - text: "Puedo ayudarte con reportes, conteos y pacientes. Si me dices el periodo, vacuna, fecha o cédula, lo resolvemos."

  utter_datos_personales:
    - text: |
        Puedo consultar información registrada en el sistema para fines de inmunización.

  utter_ayuda:
    - text: |
        Puedo ayudarte con:
        • “reporte 2025-12” o “resumen diciembre 2025”
        • “historial 0967******”
        • “parroquia del paciente 0967******” / “próxima dosis del paciente 0967******”
        • “cuántos se vacunaron con Influenza el 2025-12-10”
  utter_pedir_periodo:
    - text: |
        Me falta el **periodo**.
        Ejemplos:
        • “SRP en septiembre 2025”
        • “Influenza en 2025-09”
  
  utter_insumo_pedir_categoria:
    - text: "¿De qué **categoría**? Ej: JERINGAS, GUANTES, ALGODON, ALCOHOL."

  utter_insumo_pedir_tipo:
    - text: "¿Qué **tipo** exactamente? Ej: “23G x 1\" 0.5ml” o “Precargada”."

  utter_biologico_pedir_campo:
    - text: "¿Qué dato del biológico necesitas? Puedo: **vía, ángulo, dosis por frasco, dosis administrada, descripción**."

  utter_ack_v1:
    - text: "Listo."
  utter_ack_v2:
    - text: "Hecho."
  utter_ack_v3:
    - text: "De acuerdo."

  utter_more_v1:
    - text: "¿Quieres que muestre más resultados o que lo filtre por biológico?"
  utter_more_v2:
    - text: "¿Deseas ver más registros o filtrar por biológico?"
  utter_more_v3:
    - text: "¿Te muestro más pacientes o prefieres filtrar por biológico?"

