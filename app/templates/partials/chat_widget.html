<!-- Chat Widget PRASS -->
<button id="chatToggle" class="chat-toggle" type="button" aria-label="Abrir chat">
  💬
</button>

<div id="chatBox" class="chat-box" aria-hidden="true">
  <div class="chat-head">
    <div class="chat-title">Asistente PRASS</div>
    <button id="chatClose" class="chat-close" type="button" aria-label="Cerrar">✕</button>
  </div>

  <div id="chatMsgs" class="chat-msgs"></div>

  <div class="chat-inputbar">
    <input id="chatInput" class="chat-input" placeholder="Escribe tu consulta..." />
    <button id="chatSend" class="chat-send" type="button">Enviar</button>
  </div>
</div>
